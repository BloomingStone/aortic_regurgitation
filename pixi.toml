[workspace]
authors = ["shi_jie <1592277253@qq.com>"]
channels = [
    "nvidia/label/cuda-12.4.0",
    "nvidia",
    "conda-forge",
    "pytorch",
]
name = "aortic_regurgitation"
platforms = ["linux-64"]
version = "0.1.0"

[pypi-options]
index-url = "https://mirrors.tuna.tsinghua.edu.cn/pypi/web/simple"

[system-requirements]
cuda = "12.4"

[activation.env]
CUDA_VISIBLE_DEVICES = "3"

[tasks]

[dependencies]
pytorch = { version = "2.5.1.*", channel = "pytorch" }
pytorch-cuda = { version = "12.4.*", channel = "pytorch" }
torchio = ">=0.21.1,<0.22"
nibabel = ">=5.3.2,<6"
notebook = ">=7.5.2,<8"
pip = ">=25.3,<26"
cupy = ">=13.6.0,<14"
tqdm = ">=4.67.1,<5"
pandas = ">=2.3.3,<3"
tensorboard = ">=2.20.0,<3"
wandb = ">=0.23.1,<0.24"
easydict = ">=1.13,<2"
monai = ">=1.5.1,<2"

[pypi-dependencies]
diffdrr = ">=0.6.0, <0.7"

